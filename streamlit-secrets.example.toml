# Copy this file to:  .streamlit/secrets.toml
# Create folder `.streamlit` next to `badminton.py` if it does not exist.
# Never commit real passwords — `.streamlit/secrets.toml` should stay local / use Streamlit Cloud Secrets UI.
#
# For Streamlit Community Cloud: paste this whole block in App → Settings → Secrets.

SUPERUSER_PASSWORD = "your_secure_password_here"

# Supabase (Project Settings → API in Supabase dashboard)
SUPABASE_URL = "https://your-project-ref.supabase.co"
SUPABASE_SERVICE_KEY = "your-service-role-secret-key"
